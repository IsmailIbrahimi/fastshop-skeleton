services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-fastshop}
      POSTGRES_USER: ${DB_USER:-fastshop}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fastshop_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-fastshop}
      DB_USER: ${DB_USER:-fastshop}
      DB_PASSWORD: ${DB_PASSWORD:-fastshop_secret}
    ports:
      - "3000:3000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata: